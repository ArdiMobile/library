<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArdiMobile Downloader</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen p-4">

<div class="w-full max-w-md bg-slate-800 p-6 rounded-2xl">
  <h1 class="text-3xl font-bold text-center text-blue-500 mb-6">ArdiMobile</h1>

  <input id="url" placeholder="Paste YouTube link..."
    class="w-full p-3 rounded bg-slate-700 mb-4 text-white placeholder-gray-400"/>

  <button onclick="fetchVideo()"
    class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold transition">
    Get Download Links
  </button>

  <div id="loader" class="hidden text-center mt-4 text-gray-300">Loading...</div>
  <div id="error" class="hidden text-center mt-4 text-red-400"></div>

  <div id="result" class="mt-6 hidden">
    <img id="thumb" class="rounded mb-4 w-full"/>
    <h2 id="title" class="font-bold mb-2"></h2>
    <p id="duration" class="text-sm text-gray-400 mb-4"></p>
    <div id="links" class="space-y-2"></div>
  </div>
</div>

<script>
async function fetchVideo() {
  const url = document.getElementById('url').value;
  if (!url) return alert("Please enter a YouTube URL");

  const loader = document.getElementById('loader');
  const result = document.getElementById('result');
  const errorDiv = document.getElementById('error');

  loader.classList.remove('hidden');
  result.classList.add('hidden');
  errorDiv.classList.add('hidden');

  try {
    const res = await fetch(`/api/info?url=${encodeURIComponent(url)}`);
    const data = await res.json();

    if (data.error) {
      errorDiv.innerText = data.error;
      errorDiv.classList.remove('hidden');
      loader.classList.add('hidden');
      return;
    }

    document.getElementById('thumb').src = data.thumbnail;
    document.getElementById('title').innerText = data.title;
    document.getElementById('duration').innerText = 
      data.duration ? `Duration: ${Math.floor(data.duration / 60)}:${String(data.duration % 60).padStart(2, '0')}` : '';

    const linksDiv = document.getElementById('links');
    linksDiv.innerHTML = "";

    data.formats.forEach(f => {
      const btn = document.createElement('button');
      btn.innerText = `Download ${f.quality} MP4`;
      btn.className = "w-full bg-green-600 hover:bg-green-700 p-3 rounded font-bold transition";
      
      btn.onclick = async () => {
        btn.innerText = "Preparing download...";
        btn.disabled = true;
        
        try {
          // Redirect to the download endpoint
          window.location.href = `/api/download?url=${encodeURIComponent(data.webpage_url)}&format=${f.format_id}`;
          
          // Re-enable after short delay
          setTimeout(() => {
            btn.innerText = `Download ${f.quality} MP4`;
            btn.disabled = false;
          }, 2000);
        } catch {
          alert("Download failed. Please try again.");
          btn.innerText = `Download ${f.quality} MP4`;
          btn.disabled = false;
        }
      };
      
      linksDiv.appendChild(btn);
    });

    result.classList.remove('hidden');

  } catch {
    errorDiv.innerText = "Server error. Please try again later.";
    errorDiv.classList.remove('hidden');
  }

  loader.classList.add('hidden');
}
</script>

</body>
</html>
