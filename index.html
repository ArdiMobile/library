<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-400">Video Downloader</h1>
        
        <div class="space-y-4">
            <input type="text" id="videoUrl" placeholder="Paste YouTube URL here..." 
                class="w-full p-3 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500 text-white">
            
            <button onclick="fetchVideo()" id="btn"
                class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold transition">
                Get Download Link
            </button>
        </div>

        <div id="result" class="mt-8 hidden border-t border-gray-700 pt-6 text-center">
            <p id="videoTitle" class="font-medium mb-4 text-gray-300"></p>
            <a id="downloadBtn" href="#" target="_blank" 
                class="bg-green-600 hover:bg-green-700 px-6 py-2 rounded text-white inline-block">
                Download Now
            </a>
        </div>
    </div>

    <script>
        async function fetchVideo() {
            const urlInput = document.getElementById('videoUrl').value;
            const btn = document.getElementById('btn');
            const resultDiv = document.getElementById('result');

            if (!urlInput) return alert("Please paste a URL!");

            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                // IMPORTANT: Replace with your actual backend URL once deployed
                const response = await fetch(`https://your-backend-api.com/api/info?url=${encodeURIComponent(urlInput)}`);
                const data = await response.json();

                if (data.url) {
                    document.getElementById('videoTitle').innerText = data.title;
                    document.getElementById('downloadBtn').href = data.url;
                    resultDiv.classList.remove('hidden');
                } else {
                    alert("Failed to get video info.");
                }
            } catch (err) {
                alert("Error connecting to the backend.");
            } finally {
                btn.innerText = "Get Download Link";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
