<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArdiMobile Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center">
    <div class="w-full max-w-lg p-6 bg-slate-800 rounded-2xl shadow-xl">
        <h1 class="text-3xl font-bold text-center mb-8 text-blue-400">ArdiMobile</h1>
        
        <div class="flex flex-col gap-4">
            <input type="text" id="urlInput" placeholder="Paste YouTube link here..." 
                class="p-3 rounded-lg bg-slate-700 border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="getLink()" id="mainBtn" class="bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-500 transition">
                Get Download Link
            </button>
        </div>

        <div id="loader" class="hidden mt-6 text-center text-slate-400 animate-pulse">Analyzing video...</div>

        <div id="result" class="hidden mt-8 p-4 bg-slate-700 rounded-xl">
            <h2 id="videoTitle" class="font-semibold text-lg mb-4 truncate text-center"></h2>
            <a id="downloadLink" href="#" target="_blank" class="block text-center bg-green-600 py-3 rounded-lg font-bold hover:bg-green-500 transition">
                Download Now
            </a>
        </div>
    </div>

    <script>
        async function getLink() {
            const url = document.getElementById('urlInput').value;
            if(!url) return alert("Please paste a URL!");

            const loader = document.getElementById('loader');
            const result = document.getElementById('result');
            
            loader.classList.remove('hidden');
            result.classList.add('hidden');

            try {
                const res = await fetch(`/api/info?url=${encodeURIComponent(url)}`);
                const data = await res.json();

                if(data.url) {
                    document.getElementById('videoTitle').innerText = data.title;
                    document.getElementById('downloadLink').href = data.url;
                    result.classList.remove('hidden');
                } else {
                    alert("Error: " + (data.error || "Could not get link."));
                }
            } catch (e) {
                alert("Server connection failed.");
            } finally {
                loader.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
