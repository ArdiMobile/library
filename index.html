<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ArdiMobile Downloader</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen p-4">

<div class="w-full max-w-md bg-slate-800 p-6 rounded-2xl">
  <h1 class="text-3xl font-bold text-center text-blue-500 mb-6">ArdiMobile</h1>

  <input id="url" placeholder="Paste YouTube link..."
    class="w-full p-3 rounded bg-slate-700 mb-4"/>

  <button onclick="fetchVideo()"
    class="w-full bg-blue-600 p-3 rounded font-bold">
    Get Download Links
  </button>

  <div id="loader" class="hidden text-center mt-4">Loading...</div>

  <div id="result" class="mt-6 hidden">
    <img id="thumb" class="rounded mb-4"/>
    <h2 id="title" class="font-bold mb-4"></h2>
    <div id="links"></div>
  </div>
</div>

<script>
async function fetchVideo() {
  const url = document.getElementById('url').value;
  if (!url) return alert("Enter a URL");

  document.getElementById('loader').classList.remove('hidden');
  document.getElementById('result').classList.add('hidden');

  try {
    const res = await fetch(`/api/info?url=${encodeURIComponent(url)}`);
    const data = await res.json();

    if (data.error) return alert(data.error);

    document.getElementById('thumb').src = data.thumbnail;
    document.getElementById('title').innerText = data.title;

    const linksDiv = document.getElementById('links');
    linksDiv.innerHTML = "";

    data.formats.forEach(f => {
      const btn = document.createElement('a');
      btn.href = f.url;
      btn.innerText = "Download " + f.quality;
      btn.className = "block bg-green-600 p-2 rounded mb-2 text-center";
      btn.target = "_blank";
      linksDiv.appendChild(btn);
    });

    document.getElementById('result').classList.remove('hidden');

  } catch {
    alert("Server error");
  }

  document.getElementById('loader').classList.add('hidden');
}
</script>

</body>
</html>
